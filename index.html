<!DOCTYPE html>
<html>
  <head>
    <title>Todo App</title>
    <link 
        href="https://fonts.googleapis.com/css?family=Lato:300,400,700"
        rel="stylesheet">
    <link
        rel="stylesheet"
        href="style.css"
        media="screen"
        charset="utf-8">
  </head>
  <body class="page">
    <header class="header">
      <img src="./eisenhower-matrix.jpg" 
           alt="image of the eisenhower matrix"
           class="header__image">
      <a class="header__additional-info"
          href="https://goal-life.com/page/method/matrix-eisenhower">
          Want more details?</a>
    </header>
    <main>
      <section class="section">
        <h3 class="section__section-title
                   section__section-title_bottom-margin">Add Item</h3>
        <ul class="list">
          <li class="list__list-item">
            <input class="list__text-input
                        list__text-input_width_318px"
                 type="text">
            <button class="list__button
                           list__button_add-button">Add</button>
          </li>
        </ul>
      </section>
      <section class="section">
        <h3 class="section__section-title
                   section__section-title_basic">Todo</h3>
        <ul class="list incomplete-tasks-list">
          <li class="list__list-item
                     list__list-item_for-included-tasks">
            <input type="checkbox" 
                   class="list__checkbox-input">
            <label class="list__label
                          list__label_display_inline-block">Pay Bills
            </label>
            <input type="text"
                   class="list__text-input
                          list__text-input_for-included-tasks">
            <button class="list__button
                           list__button_edit-button">Edit</button>
            <button class="list__button
                           list__button_delete-button">
              <img src="./remove.svg" alt="icon of remove button"
                   class="delete-icon">
            </button>
          </li>
          <li class="list__list-item 
                     list__list-item_for-included-tasks">
            <input type="checkbox"
                   class="list__checkbox-input">
            <label class="list__label
                          list__label_for-edited-tasks">Go Shopping
            </label>
            <input type="text" value="Go Shopping"
                   class="list__text-input
                          list__text-input_for-edited-tasks">
            <button class="list__button
                           list__button_edit-button">Save</button>
            <button class="list__button
                           list__button_delete-button">
              <img src="./remove.svg" alt="icon of remove button"
                   class="delete-icon">
            </button>
          </li>
        </ul>
      </section>
      <section class="section">
        <h3 class="section__section-title
            section__section-title_basic">Completed</h3>
        <ul class="list completed-tasks-list">
          <li class="list__list-item 
                     list__list-item_for-included-tasks">
            <input type="checkbox" checked
                   class="list__checkbox-input">
            <label class="list__label
                          list__label_for-completed-tasks">See the Doctor
            </label>
            <input type="text"
                   class="list__text-input
                          list__text-input_for-included-tasks">
            <button class="list__button
                           list__button_edit-button">Edit</button>
            <button class="list__button
                           list__button_delete-button">
              <img src="./remove.svg" alt="icon of remove button"
                   class="delete-icon">
            </button>
          </li>
        </ul>
      </section>
    </main>
    <script src="app.js"></script>
  </body>
</html>
